# golangci-lint configuration for Swiss Knife Web Security Scanner
# Run: golangci-lint run

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  skip-dirs:
    - vendor
    - testdata

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    # Default linters
    - errcheck       # Check error handling
    - gosimple       # Simplification suggestions
    - govet          # Go vet checks
    - ineffassign    # Ineffectual assignments
    - staticcheck    # Static analysis
    - unused         # Unused code detection

    # Additional linters
    - bodyclose      # HTTP body close checker
    - contextcheck   # Context usage checker
    - dupl           # Code duplication
    - errname        # Error naming convention
    - errorlint      # Error wrapping
    - exhaustive     # Enum exhaustiveness
    - gocognit       # Cognitive complexity
    - goconst        # Repeated strings to constants
    - gocritic       # Code quality
    - gocyclo        # Cyclomatic complexity
    - godot          # Comment ending with period
    - gofmt          # Formatting
    - goimports      # Import ordering
    - gosec          # Security issues
    - misspell       # Spelling mistakes
    - nakedret       # Naked returns
    - nestif         # Nested if depth
    - nilerr         # Nil error returns
    - noctx          # HTTP requests without context
    - prealloc       # Slice preallocation
    - predeclared    # Shadowing predeclared identifiers
    - revive         # Drop-in replacement for golint
    - stylecheck     # Style checks
    - tparallel      # Test parallelization
    - unconvert      # Unnecessary conversions
    - unparam        # Unused parameters
    - whitespace     # Whitespace issues

  disable:
    - funlen         # We have our own function length guidelines
    - gochecknoglobals  # We use globals for configuration
    - gomnd          # Magic numbers - too noisy
    - lll            # Line length - handled by formatter
    - wsl            # Whitespace linter - too strict

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - io.Copy
      - io.WriteTo
      - (io.Closer).Close

  govet:
    check-shadowing: true
    enable-all: true

  gocyclo:
    min-complexity: 15

  gocognit:
    min-complexity: 20

  dupl:
    threshold: 150

  goconst:
    min-len: 3
    min-occurrences: 3

  misspell:
    locale: US

  nestif:
    min-complexity: 4

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - whyNoLint
      - hugeParam

  gosec:
    excludes:
      - G104  # Audit errors not checked - handled by errcheck
    config:
      global:
        audit: enabled

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  stylecheck:
    checks:
      - all
      - -ST1000  # Package comments - we use doc.go
      - -ST1003  # Naming - we have our own conventions

issues:
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - goconst
        - gocognit

    # Exclude known issues in generated files
    - path: ".*\\.gen\\.go"
      linters:
        - all

    # Allow longer lines in test files
    - path: _test\.go
      linters:
        - lll

  max-issues-per-linter: 50
  max-same-issues: 10
  new: false
